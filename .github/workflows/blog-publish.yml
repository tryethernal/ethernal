name: Blog Publish

on:
  # Manual trigger only — projects_v2_item requires an org-level repo and was
  # causing spurious "failed" runs on every push in this user-owned repo.
  # To publish: trigger manually or call via workflow_dispatch from blog-draft.
  workflow_dispatch:
    inputs:
      slug:
        description: 'Article slug (e.g. evm-opcodes-101). Leave empty to publish the oldest draft.'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve article
        id: resolve
        env:
          SLUG: ${{ inputs.slug }}
        run: |
          if [ -n "$SLUG" ]; then
            # Find by slug
            ARTICLE="blog/src/content/blog/${SLUG}.md"
            if [ ! -f "$ARTICLE" ]; then
              ARTICLE="blog/src/content/blog/${SLUG}.mdx"
            fi
            if [ ! -f "$ARTICLE" ]; then
              echo "ERROR: No article found for slug: $SLUG"
              echo "Available articles:"
              ls blog/src/content/blog/
              exit 1
            fi
          else
            # Find oldest draft article (by git commit date)
            ARTICLE=$(grep -rl 'status: draft' blog/src/content/blog/ | head -1)
            if [ -z "$ARTICLE" ]; then
              echo "No draft articles found. Nothing to publish."
              exit 0
            fi
          fi
          echo "article=$ARTICLE" >> $GITHUB_OUTPUT
          echo "Publishing: $ARTICLE"

      - name: Publish article
        id: publish
        if: steps.resolve.outputs.article != ''
        env:
          ARTICLE: ${{ steps.resolve.outputs.article }}
        run: |
          # Update status: draft → published in frontmatter only (between --- delimiters)
          # Use awk to check frontmatter only (not article body which may contain 'status: draft' in code examples)
          if awk 'BEGIN{c=0} /^---$/{c++} c==1 && /status: draft/{found=1} END{exit !found}' "$ARTICLE"; then
            awk '/^---$/{c++} c==1{gsub(/status: draft/,"status: published")} 1' "$ARTICLE" > "${ARTICLE}.tmp" && mv "${ARTICLE}.tmp" "$ARTICLE"
            echo "Updated status to published in $ARTICLE"
          elif grep -q 'status: published' "$ARTICLE"; then
            echo "Article is already published"
            exit 0
          else
            echo "WARNING: No status field found in frontmatter"
            exit 1
          fi

          # Commit to a publish branch
          SLUG=$(basename "$ARTICLE" .md)
          SLUG=$(basename "$SLUG" .mdx)
          BRANCH="blog/publish-${SLUG}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "$ARTICLE"

          TITLE=$(grep '^title:' "$ARTICLE" | head -1 | sed 's/title: *//; s/^"//; s/"$//')
          printf 'blog: publish — %s\n' "$TITLE" > /tmp/commit-msg.txt
          git commit -F /tmp/commit-msg.txt
          git push origin "$BRANCH"

          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: Create and merge PR
        if: steps.resolve.outputs.article != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLUG: ${{ steps.publish.outputs.slug }}
          BRANCH: ${{ steps.publish.outputs.branch }}
          TITLE: ${{ steps.publish.outputs.title }}
        run: |
          PR_URL=$(gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "blog: publish — $TITLE" \
            --body "Auto-publish article: \`$SLUG\`")
          echo "Created PR: $PR_URL"
          gh pr merge "$PR_URL" --squash --admin --delete-branch
          echo "Published: https://tryethernal.com/blog/$SLUG"
