name: Blog Publish

on:
  # Manual trigger only — projects_v2_item requires an org-level repo and was
  # causing spurious "failed" runs on every push in this user-owned repo.
  # To publish: trigger manually or call via workflow_dispatch from blog-draft.
  workflow_dispatch:
    inputs:
      article_path:
        description: 'Path to the article file (e.g. blog/src/content/blog/my-article.md)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish article
        env:
          ARTICLE: ${{ inputs.article_path }}
        run: |
          if [ ! -f "$ARTICLE" ]; then
            echo "ERROR: Article not found: $ARTICLE"
            exit 1
          fi

          # Update status: draft → published in frontmatter only (between --- delimiters)
          # Use awk to check frontmatter only (not article body which may contain 'status: draft' in code examples)
          if awk 'BEGIN{c=0} /^---$/{c++} c==1 && /status: draft/{found=1} END{exit !found}' "$ARTICLE"; then
            awk '/^---$/{c++} c==1{gsub(/status: draft/,"status: published")} 1' "$ARTICLE" > "${ARTICLE}.tmp" && mv "${ARTICLE}.tmp" "$ARTICLE"
            echo "Updated status to published in $ARTICLE"
          elif grep -q 'status: published' "$ARTICLE"; then
            echo "Article is already published"
            exit 0
          else
            echo "WARNING: No status field found in frontmatter"
            exit 1
          fi

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$ARTICLE"

          TITLE=$(grep '^title:' "$ARTICLE" | head -1 | sed 's/title: *//; s/^"//; s/"$//')
          printf 'blog: publish — %s\n' "$TITLE" > /tmp/commit-msg.txt
          git commit -F /tmp/commit-msg.txt
          git push origin develop

          SLUG=$(basename "$ARTICLE" .md)
          SLUG=$(basename "$SLUG" .mdx)
          echo "Published: https://tryethernal.com/blog/$SLUG"
