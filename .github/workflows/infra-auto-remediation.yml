name: Infra Auto-Remediation

on:
  workflow_dispatch:
    inputs:
      alert_type:
        description: 'Type of infrastructure alert (e.g., redis-memory-critical, postgres-connectivity)'
        required: true
      alert_details:
        description: 'Alert details and context for investigation'
        required: true

permissions:
  contents: read
  issues: write

jobs:
  investigate:
    concurrency:
      group: infra-remediation
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Install Redis CLI
        run: sudo apt-get update && sudo apt-get install -y redis-tools

      - name: Investigate and Remediate
        uses: anthropics/claude-code-action@v1
        with:
          max_turns: 30
          allowed_tools: "Bash,Read,Glob,Grep"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            You are an infrastructure auto-remediation agent for Ethernal, an EVM block explorer.
            Redis is accessed via `redis-cli -u "$REDIS_URL"`. BullMQ queues use the `bull:` key prefix.

            **Alert:** ${{ github.event.inputs.alert_type }}
            **Details:** ${{ github.event.inputs.alert_details }}

            ## Your job

            1. **Investigate** the alert. Check Redis memory (`INFO memory`), key distribution, BullMQ queue sizes (waiting/failed/stalled for major queues like blockSync, processBlock, receiptSync, processContract, processTokenTransfer).

            2. **Safe cleanup only.** You may:
               - Remove completed jobs older than 24h (`ZREMRANGEBYSCORE bull:{queue}:completed 0 {cutoff}`)
               - Remove failed jobs older than 7 days
               - UNLINK orphaned `bull:*:priority` legacy keys
               You must NOT: change config, restart services, scale, or delete active/waiting jobs.

            3. **Verify** after cleanup — re-check Redis memory usage and report the delta.

            4. **Post findings to Discord** via `curl -X POST "$DISCORD_CRITICAL_WEBHOOK"` with a JSON embed containing: alert type, what you found, actions taken, current status.

            5. **Create a GitHub issue** via `gh issue create` with label `infra-alert`. Title: `[Infra] ${{ github.event.inputs.alert_type }}`. Body: full investigation log. If unresolvable, add `needs-human` label and mention @antoinedc.
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          DISCORD_CRITICAL_WEBHOOK: ${{ secrets.DISCORD_CRITICAL_WEBHOOK }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
