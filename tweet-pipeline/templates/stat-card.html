<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, height=675">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1200px;
    height: 675px;
    background: #0f172a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
}
.headline {
    font-size: 96px;
    font-weight: 700;
    color: #3D95CE;
    text-align: center;
    line-height: 1.1;
    padding: 0 60px;
}
.subtitle {
    font-size: 36px;
    color: #94a3b8;
    text-align: center;
    margin-top: 24px;
    padding: 0 80px;
    line-height: 1.3;
}
.watermark {
    position: absolute;
    bottom: 24px;
    right: 32px;
    font-size: 18px;
    color: #475569;
}
</style>
</head>
<body>
<div class="headline" id="headline"></div>
<div class="subtitle" id="subtitle"></div>
<div class="watermark">tryethernal.com</div>
<script>
const params = new URLSearchParams(window.location.search);
document.getElementById('headline').textContent = params.get('headline') || '';
document.getElementById('subtitle').textContent = params.get('subtitle') || '';
</script>
</body>
</html>
