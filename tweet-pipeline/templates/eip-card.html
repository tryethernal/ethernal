<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, height=675">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1200px;
    height: 675px;
    background: #0f172a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
    position: relative;
    padding: 60px 80px;
}
.number {
    font-size: 72px;
    font-weight: 700;
    color: #3D95CE;
    line-height: 1.1;
}
.title {
    font-size: 40px;
    font-weight: 600;
    color: #ffffff;
    margin-top: 20px;
    line-height: 1.2;
}
.summary {
    font-size: 24px;
    color: #94a3b8;
    margin-top: 20px;
    line-height: 1.4;
}
.watermark {
    position: absolute;
    bottom: 24px;
    right: 32px;
    font-size: 18px;
    color: #475569;
}
</style>
</head>
<body>
<div class="number" id="number"></div>
<div class="title" id="title"></div>
<div class="summary" id="summary"></div>
<div class="watermark">tryethernal.com</div>
<script>
const params = new URLSearchParams(window.location.search);
document.getElementById('number').textContent = params.get('number') || '';
document.getElementById('title').textContent = params.get('title') || '';
document.getElementById('summary').textContent = params.get('summary') || '';
</script>
</body>
</html>
